<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a73e8">
    <meta name="description" content="Traductor interactivo Zapoteco-Español. Preservando el diidxazá mediante tecnología.">
    <title>Traductor Diidxazá - Español | Edición Estatal</title>
    
    <style>
        /* VARIABLES CSS (Para el Modo Claro y Oscuro) */
        :root {
            --bg-color: #f0f4f8;
            --panel-bg: #ffffff;
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --accent-color: #3182ce; 
            --accent-hover: #2b6cb0;
            --border-color: #e2e8f0;
            --alert-color: #e53e3e;
            --success-bg: #ebf8ff;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.05);
            --transition-speed: 0.3s;
        }

        [data-theme="dark"] {
            --bg-color: #1a202c;
            --panel-bg: #2d3748;
            --text-primary: #f7fafc;
            --text-secondary: #a0aec0;
            --border-color: #4a5568;
            --success-bg: #2b6cb0;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* NAVEGACIÓN Y MODO OSCURO */
        nav {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .theme-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: var(--card-shadow);
        }

        .theme-btn:hover {
            border-color: var(--accent-color);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent-color), #805ad5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* SECCIÓN PALABRA DEL DÍA */
        .word-of-day {
            background: var(--panel-bg);
            border-left: 4px solid #805ad5;
            padding: 15px 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .word-of-day span {
            font-size: 1.1rem;
        }

        .wod-zapotec {
            font-weight: bold;
            color: #805ad5;
            font-size: 1.3rem;
        }

        .translator-container {
            width: 100%;
            max-width: 900px;
        }

        .translation-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid transparent;
        }

        @media (min-width: 768px) {
            .translation-box {
                flex-direction: row;
                align-items: stretch;
            }
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lang-select {
            padding: 12px;
            border: none;
            border-bottom: 2px solid var(--border-color);
            font-size: 1.1rem;
            color: var(--accent-color);
            font-weight: bold;
            background: transparent;
            cursor: pointer;
            outline: none;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 15px;
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            resize: none;
            font-size: 1.3rem;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.2);
        }

        #output-text {
            background-color: rgba(0,0,0,0.02);
            font-weight: 600;
        }

        [data-theme="dark"] #output-text {
            background-color: rgba(255,255,255,0.02);
        }

        .description-box {
            background-color: var(--success-bg);
            color: var(--text-primary);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            border-left: 4px solid var(--accent-color);
            line-height: 1.6;
        }

        .description-box.not-found {
            background-color: rgba(229, 62, 62, 0.1);
            border-left-color: var(--alert-color);
        }

        .swap-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.4rem;
            cursor: pointer;
            align-self: center;
            z-index: 1;
            color: var(--text-secondary);
            box-shadow: var(--card-shadow);
        }

        .swap-btn:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .primary-btn {
            display: block;
            width: 100%;
            max-width: 280px;
            margin: 30px auto 0;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--accent-color), #2b6cb0);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(49, 130, 206, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(49, 130, 206, 0.6);
        }

        /* EFECTOS VISUALES MEJORADOS */
        .effect-water { border-color: #00a8ff; box-shadow: 0 0 30px rgba(0, 168, 255, 0.2); }
        .effect-blood { animation: latido 1.5s infinite; border-color: #e84118; }
        .effect-fire { border-color: #ff9f43; box-shadow: 0 0 30px rgba(255, 159, 67, 0.2); }
        .effect-nature { border-color: #4cd137; box-shadow: 0 0 30px rgba(76, 209, 55, 0.2); }
        
        @keyframes latido {
            0% { box-shadow: 0 0 10px rgba(232, 65, 24, 0.1); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(232, 65, 24, 0.3); transform: scale(1.01); }
            100% { box-shadow: 0 0 10px rgba(232, 65, 24, 0.1); transform: scale(1); }
        }
    </style>
</head>
<body>

    <nav>
        <button id="theme-toggle" class="theme-btn" aria-label="Cambiar modo de color">🌙 Modo Oscuro</button>
    </nav>

    <header>
        <h1>Traductor Diidxazá</h1>
        <p>Tecnología para preservar nuestras raíces</p>
    </header>

    <div class="word-of-day" aria-label="Palabra del día">
        <div>
            <span style="color: var(--text-secondary); font-size: 0.9rem;">Palabra del día</span><br>
            <span id="wod-es">Cargando...</span>
        </div>
        <div class="wod-zapotec" id="wod-zap">...</div>
    </div>

    <main class="translator-container">
        <section class="translation-box">
            <div class="panel">
                <select id="lang-source" class="lang-select" aria-label="Idioma de origen">
                    <option value="es" selected>Español</option>
                    <option value="zap">Zapoteco</option>
                </select>
                <textarea id="input-text" placeholder="Escribe la palabra aquí..." aria-label="Texto a traducir"></textarea>
            </div>

            <button id="swap-btn" class="swap-btn" aria-label="Invertir idiomas" title="Invertir idiomas">⇄</button>

            <div class="panel">
                <select id="lang-target" class="lang-select" aria-label="Idioma de destino">
                    <option value="zap" selected>Zapoteco</option>
                    <option value="es">Español</option>
                </select>
                <textarea id="output-text" placeholder="Traducción" readonly aria-label="Resultado de la traducción"></textarea>
                
                <div id="description-box" class="description-box" aria-live="polite">
                    <em>La descripción aparecerá aquí...</em>
                </div>
            </div>
        </section>

        <button id="translate-btn" class="primary-btn">Traducir Palabra</button>
    </main>

    <script>
        // 1. BASE DE DATOS INICIAL (Diccionario por defecto)
        const diccionarioBase = [
            { es: "gente", zap: "binni", desc: "Conjunto de personas o individuo" },
            { es: "mujer", zap: "gunaa", desc: "Persona de sexo femenino" },
            { es: "hombre", zap: "nguiu", desc: "Persona de sexo masculino" },
            { es: "niño", zap: "bidxiña", desc: "Persona pequeña en crecimiento" },
            { es: "madre", zap: "naa", desc: "Mujer que cuida y da vida" },
            { es: "padre", zap: "xtaa", desc: "Hombre que cuida y protege" },
            { es: "pueblo", zap: "guidxi", desc: "Lugar donde vive una comunidad" },
            { es: "sangre", zap: "rini", desc: "Líquido vital del cuerpo humano" },
            { es: "corazón", zap: "ladxi", desc: "Órgano que bombea sangre (sentimientos)" },
            { es: "palabra", zap: "didxa", desc: "Sonido que expresa una idea" },
            { es: "agua", zap: "nisa", desc: "Líquido vital para la existencia" },
            { es: "tierra", zap: "yoo", desc: "Suelo donde se cultiva" },
            { es: "flor", zap: "guie'", desc: "Parte de la planta, símbolo de belleza" },
            { es: "maíz", zap: "doo", desc: "Grano, alimento básico ancestral" },
            { es: "árbol", zap: "yaga", desc: "Planta grande con tronco leñoso" },
            { es: "sol", zap: "gubidxa", desc: "Estrella que da luz y calor" },
            { es: "fuego", zap: "guié", desc: "Energía que produce calor y luz" },
            { es: "amor", zap: "guendaró", desc: "Sentimiento de profundo afecto" },
            { es: "vida", zap: "guenda", desc: "Estado de existencia de seres vivos" },
            { es: "gracias", zap: "xquixe pe'", desc: "Expresión de profunda gratitud" },
            { es: "hola", zap: "guidxi", desc: "Saludo común (literalmente 'pueblo')" }
        ];

        // 2. SISTEMA DE PERSISTENCIA (LocalStorage)
        // Carga el diccionario guardado en el navegador, si no existe, carga el base.
        let diccionario = JSON.parse(localStorage.getItem('diccionarioZapoteco')) || diccionarioBase;

        // Guarda el diccionario actualizado en el navegador
        function guardarDatos() {
            localStorage.setItem('diccionarioZapoteco', JSON.stringify(diccionario));
        }

        // Elementos del DOM
        const inputText = document.getElementById('input-text');
        const outputText = document.getElementById('output-text');
        const langSource = document.getElementById('lang-source');
        const langTarget = document.getElementById('lang-target');
        const descBox = document.getElementById('description-box');
        const translationBox = document.querySelector('.translation-box'); 
        const themeBtn = document.getElementById('theme-toggle');

        // 3. MODO OSCURO
        themeBtn.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                themeBtn.textContent = '🌙 Modo Oscuro';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️ Modo Claro';
            }
        });

        // 4. PALABRA DEL DÍA (Aleatoria)
        function cargarPalabraDelDia() {
            // Filtramos las palabras pendientes para no mostrarlas como palabra del día
            const palabrasValidas = diccionario.filter(p => !p.zap.includes("[Pendiente]") && !p.es.includes("[Pendiente]"));
            const randomItem = palabrasValidas[Math.floor(Math.random() * palabrasValidas.length)];
            document.getElementById('wod-es').textContent = randomItem.es.charAt(0).toUpperCase() + randomItem.es.slice(1);
            document.getElementById('wod-zap').textContent = randomItem.zap;
        }
        cargarPalabraDelDia();

        // 5. EFECTOS SENSORIALES
        function aplicarEfecto(palabra) {
            translationBox.className = 'translation-box'; // Resetea clases

            const agua = ['agua', 'nisa', 'lluvia', 'mar'];
            const sangre = ['sangre', 'rini', 'corazón', 'ladxi', 'amor', 'guendaró'];
            const fuego = ['fuego', 'guié', 'sol', 'gubidxa'];
            const naturaleza = ['tierra', 'yoo', 'árbol', 'yaga', 'flor', 'guie\'', 'maíz', 'doo'];

            if (agua.includes(palabra)) translationBox.classList.add('effect-water');
            else if (sangre.includes(palabra)) translationBox.classList.add('effect-blood');
            else if (fuego.includes(palabra)) translationBox.classList.add('effect-fire');
            else if (naturaleza.includes(palabra)) translationBox.classList.add('effect-nature');
        }

        // 6. MOTOR DE TRADUCCIÓN MEJORADO
        function traducir() {
            const palabra = inputText.value.trim().toLowerCase();
            const origen = langSource.value;
            const destino = langTarget.value;

            if (palabra === "") {
                outputText.value = "";
                descBox.innerHTML = "<em>La descripción aparecerá aquí...</em>";
                descBox.className = 'description-box';
                translationBox.className = 'translation-box';
                return;
            }

            aplicarEfecto(palabra);

            let resultados = diccionario.filter(item => origen === 'es' ? item.es === palabra : item.zap === palabra);

            if (resultados.length > 0) {
                let traducciones = resultados.map(r => origen === 'es' ? r.zap : r.es);
                outputText.value = [...new Set(traducciones)].join(" / ");
                
                let htmlDescripciones = "<strong>Significados encontrados:</strong><br><br>";
                resultados.forEach(r => {
                    let palabraDestino = origen === 'es' ? r.zap : r.es;
                    htmlDescripciones += `• <strong>${palabraDestino}</strong>: ${r.desc}<br>`;
                });

                descBox.innerHTML = htmlDescripciones;
                descBox.className = 'description-box';
            } else {
                outputText.value = "Palabra no encontrada.";
                descBox.innerHTML = "<strong>¡Aporte a la comunidad!</strong> Palabra guardada en la base local del navegador para futura revisión.";
                descBox.className = 'description-box not-found';
                translationBox.className = 'translation-box';

                // Auto-guardado persistente
                let yaExiste = diccionario.find(item => item.es === palabra || item.zap === palabra);
                if (!yaExiste) {
                    if (origen === 'es') {
                        diccionario.push({ es: palabra, zap: "[Pendiente]", desc: "Aportación de usuario." });
                    } else {
                        diccionario.push({ es: "[Pendiente]", zap: palabra, desc: "Aportación de usuario." });
                    }
                    guardarDatos(); // ¡La magia sucede aquí!
                }
            }
        }

        // 7. INTERCAMBIO Y EVENTOS
        document.getElementById('swap-btn').addEventListener('click', () => {
            let tempLang = langSource.value;
            langSource.value = langTarget.value;
            langTarget.value = tempLang;
            
            let tempText = inputText.value;
            if(tempText && !outputText.value.includes("no encontrada")) {
                inputText.value = outputText.value.split(" / ")[0]; 
                traducir();
            } else {
                inputText.value = "";
                outputText.value = "";
                descBox.innerHTML = "<em>La descripción aparecerá aquí...</em>";
                descBox.className = 'description-box';
            }
        });

        document.getElementById('translate-btn').addEventListener('click', traducir);
        inputText.addEventListener('keyup', (e) => { if (e.key === 'Enter') traducir(); });
    </script>
</body>
</html>
